<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title desc">
<title id="title">Animated SoverGrid Resilient Grid</title><desc id="desc">A redundant provider grid forms and reroutes a deployment signal across multiple healthy paths.</desc>
<style>
.route{fill:none;stroke:#7C3AED;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:260;stroke-dashoffset:260;animation:draw 1.7s cubic-bezier(.65,0,.35,1) forwards}.secondary{opacity:.35;animation-delay:.45s}.node{transform-box:fill-box;transform-origin:center;transform:scale(0);animation:pop .38s cubic-bezier(.2,.9,.3,1.35) forwards}.n1{animation-delay:.1s}.n2{animation-delay:.4s}.n3{animation-delay:.75s}.n4{animation-delay:1.1s}.n5{animation-delay:1.45s}
.signal{fill:#fff;stroke:#7C3AED;stroke-width:3;filter:drop-shadow(0 0 5px #7C3AED);offset-path:path('M42 42 H138 V90 H42 V138 H138');animation:travel 4.2s ease-in-out 1.9s infinite}.fail{transform-box:fill-box;transform-origin:center;animation:fail 4.2s ease-in-out 1.9s infinite}.reroute{fill:none;stroke:#fff;stroke-width:2;stroke-dasharray:4 5;opacity:0;animation:reroute 4.2s ease-in-out 1.9s infinite}
@keyframes draw{to{stroke-dashoffset:0}}@keyframes pop{to{transform:scale(1)}}@keyframes travel{0%{offset-distance:0}42%{offset-distance:47%}55%{offset-distance:47%}100%{offset-distance:100%}}@keyframes fail{0%,42%,70%,100%{opacity:1}48%,62%{opacity:.18}}@keyframes reroute{0%,42%,70%,100%{opacity:0}48%,64%{opacity:1}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}.route{stroke-dashoffset:0}.node{transform:scale(1)}}
</style>
<rect width="180" height="180" rx="40" fill="#111"/>
<path class="route" d="M42 42H138V90H42V138H138"/><path class="route secondary" d="M42 42V90H90V42M90 90V138M138 90V138"/>
<path class="reroute" d="M90 42V90H42"/>
<g fill="#111" stroke="#fff" stroke-width="5"><rect class="node n1" x="31" y="31" width="22" height="22" rx="7"/><rect class="node n2" x="127" y="31" width="22" height="22" rx="7"/><rect class="node n3" x="79" y="79" width="22" height="22" rx="7"/><rect class="node n4" x="31" y="127" width="22" height="22" rx="7"/><rect class="node n5" x="127" y="127" width="22" height="22" rx="7"/></g>
<rect x="84" y="84" width="12" height="12" rx="3" fill="#7C3AED"/><g class="fail"><path d="M132 37L144 49M144 37L132 49" stroke="#EF4444" stroke-width="3" stroke-linecap="round"/></g>
<circle class="signal" r="6"/>
</svg>