<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — SoverGrid</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#F8F7F4; }
    .auth-wrap { width:100%; max-width:400px; padding:24px; }
    .auth-logo-row { display:flex; align-items:center; justify-content:center; gap:9px; margin-bottom:32px; }
    .auth-logo-text { font-size:17px; font-weight:800; letter-spacing:-0.3px; color:#111; }
    .auth-card { background:#fff; border:1px solid #EBEBEB; border-radius:16px; padding:32px; box-shadow:0 4px 24px rgba(0,0,0,0.05); }
    .auth-title { font-size:22px; font-weight:800; letter-spacing:-0.5px; margin-bottom:6px; }
    .auth-sub { font-size:13.5px; color:#6B6B6B; margin-bottom:28px; line-height:1.6; }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:12.5px; font-weight:600; color:#444; margin-bottom:6px; }
    .form-input { width:100%; padding:10px 12px; border:1.5px solid #DDDDD8; border-radius:8px; font-size:14px; font-family:inherit; background:#fff; color:#111; outline:none; transition:border-color .15s; }
    .form-input:focus { border-color:#7C3AED; }
    .form-input::placeholder { color:#BBBBBB; }
    .btn-auth { width:100%; padding:12px; background:#111; color:#fff; border:none; border-radius:9px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:4px; transition:background .15s; }
    .btn-auth:hover { background:#333; }
    .auth-footer { text-align:center; font-size:13px; color:#6B6B6B; margin-top:20px; }
    .auth-footer a { color:#7C3AED; font-weight:600; }
    .success-state { display:none; text-align:center; padding:12px 0; }
    .success-icon { width:52px; height:52px; border-radius:50%; background:#F0FDF4; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo-row">
    <svg viewBox="0 0 30 30" fill="none" width="26" height="26">
      <circle cx="15" cy="4"  r="3.5" fill="#7C3AED"/>
      <circle cx="4"  cy="25" r="2.8" fill="#111"/>
      <circle cx="26" cy="25" r="2.8" fill="#111"/>
      <circle cx="15" cy="16" r="2.8" fill="#111"/>
      <line x1="15" y1="4"  x2="4"  y2="25" stroke="#7C3AED" stroke-width="1.3" opacity="0.7"/>
      <line x1="15" y1="4"  x2="26" y2="25" stroke="#7C3AED" stroke-width="1.3" opacity="0.7"/>
      <line x1="4"  y1="25" x2="26" y2="25" stroke="#888" stroke-width="1.3"/>
      <line x1="15" y1="4"  x2="15" y2="16" stroke="#7C3AED" stroke-width="1.3"/>
      <line x1="4"  y1="25" x2="15" y2="16" stroke="#888" stroke-width="1.3"/>
      <line x1="26" y1="25" x2="15" y2="16" stroke="#888" stroke-width="1.3"/>
    </svg>
    <span class="auth-logo-text">sovergrid</span>
  </div>

  <div class="auth-card">
    <div id="form-view">
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-sub">Enter the email you registered with. We'll send a reset link to your inbox.</p>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="you@company.com" autocomplete="email">
      </div>
      <div id="error-msg" style="display:none;margin-bottom:12px;background:#FEF2F2;border:1px solid #FECACA;border-radius:7px;padding:10px 12px;font-size:13px;color:#B91C1C;"></div>

      <button class="btn-auth" onclick="handleReset()">Send reset link</button>
    </div>

    <div class="success-state" id="success-view">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" width="24" height="24"><path d="M5 13l4 4L19 7"/></svg>
      </div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px;">Check your inbox</div>
      <p style="font-size:13.5px;color:#6B6B6B;margin-bottom:20px;">We've sent a password reset link to <strong id="sent-to"></strong>. It expires in 15 minutes.</p>
      <a href="login.html" style="font-size:13.5px;font-weight:600;color:#7C3AED;">← Back to sign in</a>
    </div>
  </div>

  <div class="auth-footer">
    Remembered it? <a href="login.html">Sign in</a>
  </div>
</div>

<script>
function handleReset() {
  const email = document.getElementById('email').value.trim();
  const err = document.getElementById('error-msg');

  if (!email || !email.includes('@')) {
    err.style.display = 'block';
    err.textContent = 'Please enter a valid email address.';
    return;
  }

  err.style.display = 'none';
  const btn = document.querySelector('.btn-auth');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  setTimeout(() => {
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('sent-to').textContent = email;
    document.getElementById('success-view').style.display = 'block';
  }, 900);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
</script>
</body>
</html>
