<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — SoverGrid</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#F8F7F4; }
    .auth-wrap { width:100%; max-width:400px; padding:24px; }
    .auth-logo-row { display:flex; align-items:center; justify-content:center; gap:9px; margin-bottom:32px; }
    .auth-logo-text { font-size:17px; font-weight:800; letter-spacing:-0.3px; color:#111; }
    .auth-card { background:#fff; border:1px solid #EBEBEB; border-radius:16px; padding:32px; box-shadow:0 4px 24px rgba(0,0,0,0.05); }
    .auth-title { font-size:22px; font-weight:800; letter-spacing:-0.5px; margin-bottom:6px; }
    .auth-sub { font-size:13.5px; color:#6B6B6B; margin-bottom:28px; }
    .auth-sub a { color:#7C3AED; font-weight:600; }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:12.5px; font-weight:600; color:#444; margin-bottom:6px; }
    .form-input { width:100%; padding:10px 12px; border:1.5px solid #DDDDD8; border-radius:8px; font-size:14px; font-family:inherit; background:#fff; color:#111; outline:none; transition:border-color .15s; }
    .form-input:focus { border-color:#7C3AED; }
    .form-input::placeholder { color:#BBBBBB; }
    .password-wrap { position:relative; }
    .password-toggle { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#AAAAAA; padding:4px; }
    .forgot-link { display:block; text-align:right; font-size:12.5px; color:#7C3AED; font-weight:600; margin-top:6px; }
    .btn-auth { width:100%; padding:12px; background:#111; color:#fff; border:none; border-radius:9px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; transition:background .15s; }
    .btn-auth:hover { background:#333; }
    .auth-divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:#AAAAAA; font-size:12.5px; }
    .auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:#EBEBEB; }
    .auth-footer { text-align:center; font-size:13px; color:#6B6B6B; margin-top:20px; }
    .auth-footer a { color:#7C3AED; font-weight:600; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo-row">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title desc" width="28" height="28">
<title id="title">Animated SoverGrid Distributed S</title><desc id="desc">Provider nodes repeatedly appear and connect into an S-shaped route.</desc>
<style>
.route{fill:none;stroke:#fff;stroke-width:10;stroke-linecap:round;stroke-dasharray:360;animation:routeLoop 5.2s cubic-bezier(.65,0,.35,1) infinite}.signal{fill:none;stroke:#7C3AED;stroke-width:3;stroke-linecap:round;stroke-dasharray:360;animation:signalLoop 5.2s cubic-bezier(.65,0,.35,1) infinite}.node{transform-box:fill-box;transform-origin:center;animation:nodeLoop 5.2s cubic-bezier(.2,.9,.3,1.3) infinite}.n1{animation-delay:0s}.n2{animation-delay:.28s}.n3{animation-delay:.56s}.n4{animation-delay:.84s}.n5{animation-delay:1.12s}.pulse{fill:none;stroke:#7C3AED;stroke-width:2;transform-box:fill-box;transform-origin:center;animation:pulseLoop 5.2s ease-out infinite}
@keyframes routeLoop{0%,7%{stroke-dashoffset:360;opacity:0}9%{opacity:1}55%,82%{stroke-dashoffset:0;opacity:1}94%,100%{stroke-dashoffset:-360;opacity:0}}@keyframes signalLoop{0%,9%{stroke-dashoffset:360;opacity:0}11%{opacity:1}57%,82%{stroke-dashoffset:0;opacity:1}94%,100%{stroke-dashoffset:-360;opacity:0}}@keyframes nodeLoop{0%,5%{transform:scale(0);opacity:0}12%,80%{transform:scale(1);opacity:1}88%,100%{transform:scale(0);opacity:0}}@keyframes pulseLoop{0%,50%{opacity:0;transform:scale(.5)}58%{opacity:.75}78%{opacity:0;transform:scale(2.2)}100%{opacity:0}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}.route,.signal{stroke-dashoffset:0}.node{transform:scale(1)}}
</style>
<rect width="180" height="180" rx="40" fill="#111111"/>
<path class="route" d="M128 43C113 27 62 28 47 52C29 82 59 91 90 93C120 95 145 107 132 132C117 158 65 155 47 136"/>
<path class="signal" d="M128 43C113 27 62 28 47 52C29 82 59 91 90 93C120 95 145 107 132 132C117 158 65 155 47 136"/>
<g fill="#7C3AED" stroke="#111" stroke-width="5"><circle class="node n1" cx="128" cy="43" r="10"/><circle class="node n2" cx="47" cy="52" r="10"/><circle class="node n3" cx="90" cy="93" r="12"/><circle class="node n4" cx="132" cy="132" r="10"/><circle class="node n5" cx="47" cy="136" r="10"/></g>
<circle class="pulse" cx="90" cy="93" r="13"/><circle class="node n3" cx="90" cy="93" r="4" fill="#fff"/>
</svg>
    <span class="auth-logo-text">sovergrid</span>
  </div>

  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">No account? <a href="register.html">Create one free</a></p>

    <div class="form-group">
      <label class="form-label">Email address</label>
      <input class="form-input" type="email" id="email" placeholder="you@company.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="password-wrap">
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="password-toggle" type="button" onclick="togglePwd()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" id="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn-auth" onclick="handleLogin()">Sign in</button>

    <div id="error-msg" style="display:none;margin-top:12px;background:#FEF2F2;border:1px solid #FECACA;border-radius:7px;padding:10px 12px;font-size:13px;color:#B91C1C;"></div>
  </div>

  <div class="auth-footer">
    By signing in you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
  </div>
</div>

<script>
function togglePwd() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('error-msg');

  if (!email || !password) {
    err.style.display = 'block';
    err.textContent = 'Please enter your email and password.';
    return;
  }

  // Simulate: redirect to the right dashboard based on stored mode
  const mode = localStorage.getItem('sg_mode') || 'consumer';
  err.style.display = 'none';

  // Demo: fake loading
  const btn = document.querySelector('.btn-auth');
  btn.textContent = 'Signing in…';
  btn.disabled = true;
  setTimeout(() => {
    window.location.href = mode === 'developer' ? 'developer.html' : 'deployments.html';
  }, 900);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
