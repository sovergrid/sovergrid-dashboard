<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring — SoverGrid</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --sidebar-width: 236px; }
    .sidebar.collapsed .sidebar-user-info { display:none; }
    .sidebar.collapsed .sidebar-user { justify-content:center; padding:10px 0; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo-wrap">
        <div class="sidebar-logo-icon" id="logo-icon">
          <svg viewBox="0 0 30 30" fill="none" width="26" height="26">
            <circle cx="15" cy="4"  r="3.5" fill="#7C3AED"/>
            <circle cx="4"  cy="25" r="2.8" fill="#111"/>
            <circle cx="26" cy="25" r="2.8" fill="#111"/>
            <circle cx="15" cy="16" r="2.8" fill="#111"/>
            <line x1="15" y1="4"  x2="4"  y2="25" stroke="#7C3AED" stroke-width="1.3" opacity="0.7"/>
            <line x1="15" y1="4"  x2="26" y2="25" stroke="#7C3AED" stroke-width="1.3" opacity="0.7"/>
            <line x1="4"  y1="25" x2="26" y2="25" stroke="#888" stroke-width="1.3"/>
            <line x1="15" y1="4"  x2="15" y2="16" stroke="#7C3AED" stroke-width="1.3"/>
            <line x1="4"  y1="25" x2="15" y2="16" stroke="#888" stroke-width="1.3"/>
            <line x1="26" y1="25" x2="15" y2="16" stroke="#888" stroke-width="1.3"/>
          </svg>
        </div>
        <span class="sidebar-logo-text">sovergrid</span>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">JO</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Joel Oyewole</div>
          <div class="sidebar-user-plan" id="mode-label" style="color:#7C3AED;font-weight:600;"></div>
        </div>
      </div>
    </div>
  </aside>
  <div class="main">
    <div class="page-header">
      <span class="page-title">Monitoring</span>
      <div style="display:flex;gap:10px;">
        <a href="developer.html" class="btn btn-ghost btn-sm">← Console</a>
      </div>
    </div>
    <div class="content">
      
      <div class="card" style="margin-bottom:14px;">
        <div class="card-header"><span class="card-title">System Health</span></div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
            <div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:14px;">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#15803D;margin-bottom:6px;">invoice-sentinel-api</div>
              <div style="font-size:22px;font-weight:800;color:#111;letter-spacing:-1px;">99.98%</div>
              <div style="font-size:12px;color:#6B6B6B;">30-day uptime</div>
            </div>
            <div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:14px;">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#15803D;margin-bottom:6px;">sovergrid-landing</div>
              <div style="font-size:22px;font-weight:800;color:#111;letter-spacing:-1px;">99.71%</div>
              <div style="font-size:12px;color:#6B6B6B;">30-day uptime</div>
            </div>
            <div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:14px;">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#B91C1C;margin-bottom:6px;">nexus-arch-demo</div>
              <div style="font-size:22px;font-weight:800;color:#111;letter-spacing:-1px;">Stopped</div>
              <div style="font-size:12px;color:#6B6B6B;">No active containers</div>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Request Rate (last 24h)</span></div>
        <div class="card-body" style="text-align:center;padding:40px;color:#AAAAAA;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36" style="margin-bottom:12px;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <div style="font-size:14px;font-weight:600;color:#6B6B6B;">Live charts will appear here when connected to the backend</div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toasts"></div>
<script>
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3200);
}
</script>
<script>window.SG_ACTIVE_PAGE = 'monitoring';</script>
<script src="sg-nav.js"></script>
</body>
</html>
